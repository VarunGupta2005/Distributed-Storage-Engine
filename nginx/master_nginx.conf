events { 
    worker_connections 1024; 
}

http {
    upstream master_cluster {
        # Points to C++ Master Nodes running locally
        server master_1:8081 max_fails=2 fail_timeout=10s;
        server master_2:8081 max_fails=2 fail_timeout=10s;
    }

    server {
        listen 80; 

        location / {
            proxy_pass http://master_cluster;
            
            # Automatic Failover settings
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_connect_timeout 2s;
        }
    }
}